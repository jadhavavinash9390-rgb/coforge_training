<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="login.css">
<title>Log In</title>

</head>

<body>
<div class="Logindiv">
<table>

    <tr>
        <td>Username:</td>
        <td><input type="text"></td>
    </tr>

    <tr>
        <td>Password:</td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td colspan="2" align="center">
        <input type="submit" value="Login" class="LoginButton">
        </td>
    </tr>

</table>
</div>
</body>
</html>
