<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="ISO-8859-1">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Grid System</title>

    <style>

        body{
            background:#f5f5f5;
        }

        .header{
            background:#4d73bf;
            color:black;
            text-align:center;
            font-size:70px;
            font-weight:bold;
            border-radius:25px;
            padding:30px;
            margin-top:30px;
        }

        .box{
            height:350px;
            border-radius:40px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            font-weight:bold;
            color:black;
            margin-top:25px;
        }

        .green{
            background:#76b347;
        }

        .orange{
            background:#f57c28;
        }

        .yellow{
            background:#ffc107;
        }

        .footer{
            background:#5d95cb;
            color:black;
            text-align:center;
            font-size:35px;
            font-weight:bold;
            margin-top:20px;
            border-radius:10px;
            padding:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="row">
        <div class="col-12">
            <div class="header">
                Header
            </div>
        </div>
    </div>

    <!-- Three Columns -->
    <div class="row">

        <div class="col-md-4">
            <div class="box green">
                Column 1
            </div>
        </div>

        <div class="col-md-4">
            <div class="box orange">
                Column 2
            </div>
        </div>

        <div class="col-md-4">
            <div class="box yellow">
                Column 3
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="row">
        <div class="col-12">
            <div class="footer">
                Footer
            </div>
        </div>
    </div>

</div>

</body>
</html>
