<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="EmployeeStyle.css">
<title>Employee Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="header">
        <h1>Employee Management System</h1>
    </div>
    <br>
    <div class="content">
        <table>

            <tr>
                <td>Employee ID:</td>
                <td><input type="number"></td>
            </tr>

    <tr>
        <td>Employee Name:</td>
        <td><input type="text"></td>
    </tr>
    <tr>
        <td>Employee Salary:</td>
        <td><input type="number"></td>
    </tr>
    <tr>
        <td>Department Number:</td>
        <td><input type="number"></td>
    </tr>


        </table>
        <br>
        <input type="submit" value="Insert" class="btn btn-primary"></input>
        <input type="submit" value="Delete" class="btn btn-danger"></input>
        <input type="submit" value="Update" class="btn btn-warning"></input>
        <input type="submit" value="Find" class="btn btn-secondary"></input>
        <input type="submit" value="FindAll" class="btn btn-dark"></input>
        <br>

    </div>
</body>
</html>
