<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Factorial Table</title>

<script>
function factorialTable() {

    var n = parseInt(document.getElementById("n1").value);
    var fact = 1;
    var result = "";

    result = "<table border='1' width='40%'>";
    result += "<tr><th>Number</th><th>Factorial</th></tr>";

    for (var i = 1; i <= n; i++) {
        fact = fact * i;
        result += "<tr><td>" + i + "</td><td>" + fact + "</td></tr>";
    }

    result += "</table>";

    document.getElementById("result").innerHTML = result;
}
</script>

</head>

<body>

Enter Number:
<input type="number" id="n1">
<br>

<button onclick="factorialTable()">Find Factorial</button>

<br><br>

<div id="result"></div>

</body>
</html>
