<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    
    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
        }

        table{
            width:70%;
            margin:40px auto;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:2px solid gray;
            padding:10px;
        }

        .heading{
            font-size:35px;
            font-weight:bold;
            text-align:center;
            padding:20px;
        }

        input,textarea{
            width:300px;
            padding:5px;
        }

        textarea{
            height:60px;
        }

        .gender input{
            width:auto;
        }

        .submit{
            width:90px;
            padding:8px;
            font-size:16px;
        }

    </style>
    <link rel="stylesheet" href="AssingmetProblem3.css">
    <script type="text/javascript">

    function passwordstrenght() {
    	

        var password = document.getElementById("pwd").value;

        var req = new XMLHttpRequest();

        req.open("GET",
        "http://localhost:8033/MyWebApplication/PasswordStrengthServlet?email=" + password,
        true);

        req.onreadystatechange = function() {

  
            if(req.readyState == 4 && req.status == 200) {

                document.getElementById("result").innerHTML = req.responseText;

            }

        }

        req.send();

    }
    
  function EmailCheck() {
    	

        var email = document.getElementById("email").value;

        var req = new XMLHttpRequest();

        req.open("GET",
        "http://localhost:8033/MyWebApplication/EmailCheckServlet?pwd=" + email,
        true);

        req.onreadystatechange = function() {

  
            if(req.readyState == 4 && req.status == 200) {

                document.getElementById("result1").innerHTML = req.responseText;

            }

        }

        req.send();

    }

    </script>
</head>
<body>

<form>
<table>

<tr>
    <th colspan="2" class="title">Registration Form</th>
</tr>

<tr>
    <td>Student Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Father's Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Mother's Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Date of Birth</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Gender</td>
<td>
    <div class="gender">
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
    </div>
</td>
</tr>

<tr>
    <td>Email ID</td>
    <td>
    <input type="email" id="email" onblur ="EmailCheck()">
        <span id="result1"></span>
     </td>
    
</tr>

<tr>
<td>Password</td>
<td>
    <input type="password" id="pwd" onkeyup="passwordstrenght()">
    <span id="result"></span>
</td>
</tr>

<tr>
    <td>Mobile No.</td>
    <td><input type="tel"></td>
</tr>

<tr>
    <td>Address</td>
    <td><textarea rows="5" cols="30"></textarea></td>
</tr>

<tr>
    <td>State</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>City</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td></td>
    <td><input type="submit" value="Submit"></td>
</tr>

</table>
</form>
</body>
</html>
