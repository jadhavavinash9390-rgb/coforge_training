<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Change Font Size</title>

<script>
function increaseFont() {
    document.getElementById("text").style.fontSize = "30px";
}
</script>

</head>
<body>

<p id="text">
This is a sample paragraph.
</p>

<button onclick="increaseFont()">Increase Font Size</button>

</body>
</html>
