<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Change Text Content</title>
<script type="text/javascript">
function changeText() {
	document.getElementById("heading").innerHTML = "Welcome to JavaScript DOM";
}
</script>
</head>
<body>
<h1 id="heading">Hello Everyone</h1>
<button onclick="changeText()">Click Here</button>

</body>
</html>
